<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - SmartTools Hub</title>
    <meta name="description" content="Have questions or feedback? Contact the SmartTools Hub team for support and feature requests.">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>

    <header>
        <div class="container navbar">
            <a href="index.html" class="logo">
                <i class="fas fa-bolt"></i> SmartTools
            </a>
            
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="all-tools.html">All Tools</a>
                <a href="contact.html" class="active">Contact</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="section" style="max-width: 600px; margin: 0 auto">
            <div style="text-align: center; margin-bottom: 3rem">
                <h1>Contact Us</h1>
                <p>We'd love to hear from you. Send us your feedback or tool requests.</p>
            </div>

            <div class="box" style="padding: 2.5rem">
                <form id="contact-form">
                    <div class="input-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                    </div>

                    <div class="input-group">
                        <label for="message">Message</label>
                        <textarea id="message" class="form-control" rows="5" placeholder="How can we help?" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 1rem">
                        <i class="fas fa-paper-plane"></i> Send Message
                    </button>
                </form>
            </div>

            <div style="margin-top: 3rem; text-align: center; opacity: 0.7">
                <p><i class="fas fa-envelope"></i> support@smarttoolshub.com</p>
                <p><i class="fab fa-twitter"></i> @SmartToolsHub</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container" style="text-align: center; padding: 2rem">
            <p>&copy; 2026 SmartTools Hub. All rights reserved.</p>
        </div>
    </footer>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('contact-form').addEventListener('submit', (e) => {
            e.preventDefault();
            Utils.showToast('Message sent successfully! We will get back to you soon.', 'success');
            e.target.reset();
        });
    </script>
</body>
</html>
