<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock PDF - Remove Password Online - SmartTools Hub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
</head>
<body>

    <header>
        <div class="container navbar">
            <a href="../../index.html" class="logo">
                <i class="fas fa-bolt"></i> SmartTools
            </a>
        </div>
    </header>

    <main class="container">
        <div style="text-align: center; padding: 4rem 0 2rem;">
            <h1>Unlock PDF</h1>
            <p>Remove passwords and restrictions from your PDF files.</p>
        </div>

        <div id="upload-zone" class="upload-zone">
            <i class="fas fa-unlock"></i>
            <h2>Select PDF File</h2>
            <p>or drag and drop here</p>
            <input type="file" id="pdf-input" accept="application/pdf" style="display: none">
            <button class="btn btn-primary">Choose PDF</button>
        </div>

        <div id="workspace" style="display: none; max-width: 600px; margin: 2rem auto">
            <div class="box" style="padding: 2rem; text-align: center">
                <i class="fas fa-file-pdf" style="font-size: 3rem; color: #ef4444; margin-bottom: 1rem"></i>
                <h3 id="file-name">filename.pdf</h3>
                
                <div class="input-group" id="password-group" style="margin-top: 2rem">
                    <label>Enter Password</label>
                    <div style="position: relative">
                        <input type="password" id="pdf-pass" class="form-control" placeholder="Enter file password" style="padding-right: 3rem">
                        <button type="button" id="toggle-pass" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); opacity: 0.5">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <p style="font-size: 0.8rem; opacity: 0.6; margin-top: 0.5rem">Note: You must know the password to remove encryption.</p>
                </div>

                <button id="unlock-btn" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 2rem">
                    <i class="fas fa-unlock-alt"></i> Remove Password
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="result-screen">
            <i class="fas fa-check-circle success-icon"></i>
            <h2>Password Removed!</h2>
            <p>The PDF is now unprotected. All restrictions have been removed.</p>
            
            <div class="flex gap-4" style="justify-content: center; margin-top: 2rem">
                <button id="download-final" class="btn btn-primary btn-lg">
                    <i class="fas fa-download"></i> Download Unlocked PDF
                </button>
                <button onclick="location.reload()" class="btn btn-outline">
                    <i class="fas fa-redo"></i> Unlock Another
                </button>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/main.js"></script>

    <script>
        const pdfInput = document.getElementById('pdf-input');
        const workspace = document.getElementById('workspace');
        const fileName = document.getElementById('file-name');
        const pdfPass = document.getElementById('pdf-pass');
        const togglePass = document.getElementById('toggle-pass');
        const unlockBtn = document.getElementById('unlock-btn');
        const resultScreen = document.getElementById('result-screen');
        const downloadFinal = document.getElementById('download-final');

        let currentFile = null;
        let unlockedBlob = null;

        // Toggle Password Visibility
        togglePass.addEventListener('click', () => {
            const type = pdfPass.getAttribute('type') === 'password' ? 'text' : 'password';
            pdfPass.setAttribute('type', type);
            togglePass.querySelector('i').classList.toggle('fa-eye');
            togglePass.querySelector('i').classList.toggle('fa-eye-slash');
        });

        pdfInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.type !== 'application/pdf') {
                Utils.showToast('Please select a valid PDF file', 'error');
                return;
            }

            currentFile = file;
            fileName.textContent = file.name;
            workspace.style.display = 'block';
            document.getElementById('upload-zone').style.display = 'none';
        });

        unlockBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            unlockBtn.disabled = true;
            unlockBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Unlocking...';

            try {
                const arrayBuffer = await currentFile.arrayBuffer();
                const { PDFDocument } = PDFLib;
                
                let pdfDoc;
                try {
                    // Try to load with provided password
                    pdfDoc = await PDFDocument.load(arrayBuffer, { 
                        password: pdfPass.value || undefined,
                        ignoreEncryption: false
                    });
                } catch (e) {
                    if (e.message.includes('encrypted')) {
                        throw new Error("Invalid password. Please try again.");
                    }
                    throw new Error("Error loading PDF. It might be corrupted.");
                }

                // If loaded successfully, save it (this removes the password)
                const pdfBytes = await pdfDoc.save();
                unlockedBlob = new Blob([pdfBytes], { type: 'application/pdf' });

                workspace.style.display = 'none';
                resultScreen.style.display = 'block';
                Utils.showToast('PDF unlocked successfully!', 'success');
            } catch (err) {
                console.error(err);
                Utils.showToast(err.message, 'error');
            } finally {
                unlockBtn.disabled = false;
                unlockBtn.innerHTML = '<i class="fas fa-unlock-alt"></i> Remove Password';
            }
        });

        downloadFinal.addEventListener('click', () => {
            if (unlockedBlob) Utils.downloadBlob(unlockedBlob, `unlocked-${currentFile.name}`);
        });
    </script>
</body>
</html>
