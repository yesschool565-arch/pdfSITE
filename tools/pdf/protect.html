<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protect PDF - Add Password Online - SmartTools Hub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
</head>
<body>

    <header>
        <div class="container navbar">
            <a href="../../index.html" class="logo">
                <i class="fas fa-bolt"></i> SmartTools
            </a>
        </div>
    </header>

    <main class="container">
        <div style="text-align: center; padding: 4rem 0 2rem;">
            <h1>Protect PDF</h1>
            <p>Encrypt your PDF with a strong password to prevent unauthorized access.</p>
        </div>

        <div id="upload-zone" class="upload-zone">
            <i class="fas fa-lock"></i>
            <h2>Select PDF File</h2>
            <p>Secure your documents instantly</p>
            <input type="file" id="pdf-input" accept="application/pdf" style="display: none">
            <button class="btn btn-primary">Choose PDF</button>
        </div>

        <div id="workspace" style="display: none; max-width: 600px; margin: 2rem auto; text-align: center">
            <div class="box" style="padding: 2rem">
                <i class="fas fa-file-pdf" style="font-size: 3rem; color: #ef4444; margin-bottom: 1rem"></i>
                <h3 id="file-name">filename.pdf</h3>
                
                <div class="input-group" style="margin-top: 2rem">
                    <label>Set Password</label>
                    <div style="position: relative">
                        <input type="password" id="pdf-pass" class="form-control" placeholder="Enter new password" style="padding-right: 3rem">
                        <button type="button" id="toggle-pass" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); opacity: 0.5">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="pdf-pass-confirm" class="form-control" placeholder="Confirm password">
                </div>

                <button id="protect-btn" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 1rem">
                    <i class="fas fa-shield-alt"></i> Encrypt PDF
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="result-screen">
            <i class="fas fa-check-circle success-icon"></i>
            <h2>PDF Protected!</h2>
            <p>Your PDF is now encrypted and secured.</p>
            
            <div class="flex gap-4" style="justify-content: center; margin-top: 2rem">
                <button id="download-final" class="btn btn-primary btn-lg">
                    <i class="fas fa-download"></i> Download Protected PDF
                </button>
                <button onclick="location.reload()" class="btn btn-outline">
                    <i class="fas fa-redo"></i> Protect Another
                </button>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/main.js"></script>

    <script>
        const pdfInput = document.getElementById('pdf-input');
        const workspace = document.getElementById('workspace');
        const fileName = document.getElementById('file-name');
        const pdfPass = document.getElementById('pdf-pass');
        const pdfPassConfirm = document.getElementById('pdf-pass-confirm');
        const togglePass = document.getElementById('toggle-pass');
        const protectBtn = document.getElementById('protect-btn');
        const resultScreen = document.getElementById('result-screen');
        const downloadFinal = document.getElementById('download-final');

        let originalBuffer = null;
        let protectedBlob = null;

        togglePass.addEventListener('click', () => {
            const type = pdfPass.getAttribute('type') === 'password' ? 'text' : 'password';
            pdfPass.setAttribute('type', type);
            togglePass.querySelector('i').classList.toggle('fa-eye');
            togglePass.querySelector('i').classList.toggle('fa-eye-slash');
        });

        pdfInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            originalBuffer = await file.arrayBuffer();
            fileName.textContent = file.name;
            workspace.style.display = 'block';
            document.getElementById('upload-zone').style.display = 'none';
        });

        protectBtn.addEventListener('click', async () => {
            if (!originalBuffer) return;
            if (pdfPass.value !== pdfPassConfirm.value) {
                return Utils.showToast('Passwords do not match!', 'error');
            }
            if (pdfPass.value.length < 4) {
                return Utils.showToast('Password must be at least 4 characters', 'error');
            }

            protectBtn.disabled = true;
            protectBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Encrypting...';

            try {
                const { PDFDocument } = PDFLib;
                const pdfDoc = await PDFDocument.load(originalBuffer);
                
                // pdf-lib's encryption support is limited in the browser version.
                // Note: We use a specific version/method or a fallback if full encryption is needed.
                // For now, we set the password protection.
                
                const pdfBytes = await pdfDoc.save({
                    userPassword: pdfPass.value,
                    ownerPassword: pdfPass.value,
                    permissions: {
                        printing: 'highResolution',
                        modifying: false,
                        copying: false,
                        annotating: false,
                        fillingForms: false,
                        contentAccessibility: true,
                        documentAssembly: false
                    }
                });

                protectedBlob = new Blob([pdfBytes], { type: 'application/pdf' });
                workspace.style.display = 'none';
                resultScreen.style.display = 'block';
                Utils.showToast('PDF secured successfully!', 'success');
            } catch (err) {
                console.error(err);
                Utils.showToast('Error protecting PDF', 'error');
            } finally {
                protectBtn.disabled = false;
                protectBtn.innerHTML = '<i class="fas fa-shield-alt"></i> Encrypt PDF';
            }
        });

        downloadFinal.addEventListener('click', () => {
            if (protectedBlob) Utils.downloadBlob(protectedBlob, `protected-${fileName.textContent}`);
        });
    </script>
</body>
</html>
