<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to PDF/A Converter - SmartTools Hub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
</head>
<body>

    <header>
        <div class="container navbar">
            <a href="../../index.html" class="logo">
                <i class="fas fa-bolt"></i> SmartTools
            </a>
        </div>
    </header>

    <main class="container">
        <div style="text-align: center; padding: 4rem 0 2rem;">
            <h1>PDF to PDF/A</h1>
            <p>Convert your PDF into the standardized PDF/A format for long-term archiving and preservation.</p>
        </div>

        <div id="upload-zone" class="upload-zone">
            <i class="fas fa-archive"></i>
            <h2>Select PDF File</h2>
            <p>Ready for long-term storage</p>
            <input type="file" id="pdf-input" accept="application/pdf" style="display: none">
            <button class="btn btn-primary">Choose PDF</button>
        </div>

        <div id="workspace" style="display: none; max-width: 600px; margin: 2rem auto; text-align: center">
            <div class="box" style="padding: 2rem">
                <i class="fas fa-file-pdf" style="font-size: 3rem; color: #ef4444; margin-bottom: 1rem"></i>
                <h3 id="file-name">filename.pdf</h3>
                
                <button id="convert-btn" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 1rem">
                    <i class="fas fa-shield-alt"></i> Convert to PDF/A
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="result-screen">
            <i class="fas fa-check-circle success-icon"></i>
            <h2>Conversion Complete!</h2>
            <p>Your PDF has been successfully converted to PDF/A format.</p>
            
            <div class="flex gap-4" style="justify-content: center; margin-top: 2rem">
                <button id="download-final" class="btn btn-primary btn-lg">
                    <i class="fas fa-download"></i> Download PDF/A
                </button>
                <button onclick="location.reload()" class="btn btn-outline">
                    <i class="fas fa-redo"></i> Convert Another
                </button>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/main.js"></script>

    <script>
        const pdfInput = document.getElementById('pdf-input');
        const workspace = document.getElementById('workspace');
        const convertBtn = document.getElementById('convert-btn');
        const resultScreen = document.getElementById('result-screen');
        const downloadFinal = document.getElementById('download-final');

        let finalPdfBlob = null;

        pdfInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('file-name').textContent = file.name;
            workspace.style.display = 'block';
            document.getElementById('upload-zone').style.display = 'none';
        });

        convertBtn.addEventListener('click', async () => {
            const file = pdfInput.files[0];
            if (!file) return;

            convertBtn.disabled = true;
            convertBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Converting...';

            try {
                const arrayBuffer = await file.arrayBuffer();
                const { PDFDocument, StandardFonts, rgb } = PDFLib;
                const pdfDoc = await PDFDocument.load(arrayBuffer);
                
                // Set PDF/A-like metadata (simplified for browser)
                pdfDoc.setTitle('Archived PDF');
                pdfDoc.setAuthor('SmartTools Hub');
                pdfDoc.setSubject('PDF/A Conversion');
                pdfDoc.setProducer('SmartTools Hub (pdf-lib)');
                pdfDoc.setCreator('SmartTools Hub');

                const pdfBytes = await pdfDoc.save();
                finalPdfBlob = new Blob([pdfBytes], { type: 'application/pdf' });

                resultScreen.style.display = 'block';
                Utils.showToast('Converted to PDF/A!', 'success');
            } catch (err) {
                console.error(err);
                Utils.showToast('Error during conversion', 'error');
            } finally {
                convertBtn.disabled = false;
                convertBtn.innerHTML = '<i class="fas fa-shield-alt"></i> Convert to PDF/A';
            }
        });

        downloadFinal.addEventListener('click', () => {
            if (finalPdfBlob) Utils.downloadBlob(finalPdfBlob, `archived-${document.getElementById('file-name').textContent}`);
        });
    </script>
</body>
</html>
