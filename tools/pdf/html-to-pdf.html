<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML to PDF Converter - SmartTools Hub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <style>
        .html-preview {
            width: 100%;
            height: 400px;
            background: white;
            color: black;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            overflow: auto;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <header>
        <div class="container navbar">
            <a href="../../index.html" class="logo">
                <i class="fas fa-bolt"></i> SmartTools
            </a>
        </div>
    </header>

    <main class="container">
        <div style="text-align: center; padding: 4rem 0 2rem;">
            <h1>HTML to PDF</h1>
            <p>Paste HTML code or a URL to convert it into a professional PDF document.</p>
        </div>

        <div style="max-width: 800px; margin: 0 auto">
            <div class="box" style="padding: 2rem">
                <div class="input-group">
                    <label>Paste HTML Code</label>
                    <textarea id="html-input" class="form-control" style="height: 200px" placeholder="<div><h1>Hello World</h1><p>This is a test.</p></div>"></textarea>
                </div>
                
                <button id="convert-btn" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 1rem">
                    <i class="fas fa-magic"></i> Generate PDF
                </button>
            </div>

            <div id="preview-area" style="display: none; margin-top: 2rem">
                <h3>Preview</h3>
                <div id="render-target" class="html-preview"></div>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="result-screen">
            <i class="fas fa-check-circle success-icon"></i>
            <h2>PDF Ready!</h2>
            <p>Your HTML has been rendered into a PDF document.</p>
            
            <div class="flex gap-4" style="justify-content: center; margin-top: 2rem">
                <button id="download-final" class="btn btn-primary btn-lg">
                    <i class="fas fa-download"></i> Download PDF
                </button>
                <button onclick="location.reload()" class="btn btn-outline">
                    <i class="fas fa-redo"></i> Convert Another
                </button>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/main.js"></script>

    <script>
        const htmlInput = document.getElementById('html-input');
        const convertBtn = document.getElementById('convert-btn');
        const renderTarget = document.getElementById('render-target');
        const resultScreen = document.getElementById('result-screen');
        const downloadFinal = document.getElementById('download-final');

        let finalPdf = null;

        convertBtn.addEventListener('click', async () => {
            const html = htmlInput.value.trim();
            if (!html) return Utils.showToast('Please paste some HTML code', 'error');

            renderTarget.innerHTML = html;
            document.getElementById('preview-area').style.display = 'block';
            
            convertBtn.disabled = true;
            convertBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Rendering...';

            try {
                const { jsPDF } = window.jspdf;
                const canvas = await html2canvas(renderTarget, {
                    scale: 2,
                    useCORS: true
                });
                
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF('p', 'mm', 'a4');
                const imgProps = pdf.getImageProperties(imgData);
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                finalPdf = pdf;

                resultScreen.style.display = 'block';
                Utils.showToast('PDF generated!', 'success');
            } catch (err) {
                console.error(err);
                Utils.showToast('Error rendering PDF', 'error');
            } finally {
                convertBtn.disabled = false;
                convertBtn.innerHTML = '<i class="fas fa-magic"></i> Generate PDF';
            }
        });

        downloadFinal.addEventListener('click', () => {
            if (finalPdf) finalPdf.save('smarttools-html.pdf');
        });
    </script>
</body>
</html>
