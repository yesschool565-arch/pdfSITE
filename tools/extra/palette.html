<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Generator - SmartTools Hub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    
    <style>
        .palette-workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .palette-workspace { grid-template-columns: 1fr; }
        }

        .image-preview {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #preview-img {
            max-width: 100%;
            border-radius: 0.5rem;
        }

        .palette-result {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .color-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            overflow: hidden;
            transition: var(--transition);
        }

        .color-swatch {
            height: 80px;
            width: 100%;
        }

        .color-info {
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .color-hex {
            font-family: monospace;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <header>
        <div class="container navbar">
            <a href="../../index.html" class="logo">
                <i class="fas fa-bolt"></i> SmartTools
            </a>
        </div>
    </header>

    <main class="container">
        <div style="text-align: center; padding: 4rem 0 2rem;">
            <h1>Color Palette Generator</h1>
            <p>Extract beautiful color palettes from any image instantly.</p>
        </div>

        <div id="upload-zone" class="upload-zone">
            <i class="fas fa-palette"></i>
            <h2>Select Image</h2>
            <p>Upload an image to extract colors</p>
            <input type="file" id="image-input" accept="image/*" style="display: none">
            <button class="btn btn-primary">Choose Image</button>
        </div>

        <div id="workspace" style="display: none">
            <div class="palette-workspace">
                <div class="image-preview">
                    <img id="preview-img" src="">
                </div>

                <div class="palette-result" id="palette-result">
                    <!-- Colors will appear here -->
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 2rem">
                <button onclick="location.reload()" class="btn btn-outline">
                    <i class="fas fa-redo"></i> Extract from another image
                </button>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/main.js"></script>

    <script>
        const imageInput = document.getElementById('image-input');
        const workspace = document.getElementById('workspace');
        const previewImg = document.getElementById('preview-img');
        const paletteResult = document.getElementById('palette-result');
        const colorThief = new ColorThief();

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (f) => {
                previewImg.src = f.target.result;
                workspace.style.display = 'block';
                document.getElementById('upload-zone').style.display = 'none';
            };
            reader.readAsDataURL(file);
        });

        previewImg.addEventListener('load', () => {
            const palette = colorThief.getPalette(previewImg, 6);
            renderPalette(palette);
        });

        function rgbToHex(r, g, b) {
            return "#" + [r, g, b].map(x => {
                const hex = x.toString(16);
                return hex.length === 1 ? '0' + hex : hex;
            }).join('').toUpperCase();
        }

        function renderPalette(palette) {
            paletteResult.innerHTML = palette.map(color => {
                const hex = rgbToHex(...color);
                return `
                    <div class="color-card animate-fade-in" onclick="copyColor('${hex}')" style="cursor: pointer">
                        <div class="color-swatch" style="background: ${hex}"></div>
                        <div class="color-info">
                            <span class="color-hex">${hex}</span>
                            <i class="fas fa-copy" style="opacity: 0.5"></i>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.copyColor = (hex) => {
            navigator.clipboard.writeText(hex);
            Utils.showToast(`Color ${hex} copied!`, 'success');
        };
    </script>
</body>
</html>
