<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator - SmartTools Hub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    
    <style>
        .pass-container {
            max-width: 600px;
            margin: 2rem auto;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2.5rem;
        }

        .display-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            font-family: monospace;
            font-size: 1.5rem;
            letter-spacing: 2px;
            word-break: break-all;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .checkbox-group:hover {
            border-color: var(--primary);
        }

        .checkbox-group input {
            width: 1.2rem;
            height: 1.2rem;
            accent-color: var(--primary);
        }
    </style>
</head>
<body>

    <header>
        <div class="container navbar">
            <a href="../../index.html" class="logo">
                <i class="fas fa-bolt"></i> SmartTools
            </a>
        </div>
    </header>

    <main class="container">
        <div style="text-align: center; padding: 4rem 0 1rem;">
            <h1>Password Generator</h1>
            <p>Generate highly secure, random passwords instantly.</p>
        </div>

        <div class="pass-container box">
            <div class="result-display">
                <input type="text" id="pass-val" readonly value="Click Generate">
                <div class="flex gap-2">
                    <button class="btn btn-icon" id="copy-btn" title="Copy">
                        <i class="fas fa-copy"></i>
                    </button>
                    <button class="btn btn-icon" id="regen-btn" title="Regenerate">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>

            <!-- Strength Meter -->
            <div id="strength-container" style="margin: 1.5rem 0">
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem">
                    <span style="font-size: 0.85rem">Strength:</span>
                    <span id="strength-text" style="font-weight: 700; font-size: 0.85rem">None</span>
                </div>
                <div style="height: 6px; background: var(--border); border-radius: 3px; overflow: hidden">
                    <div id="strength-bar" style="width: 0; height: 100%; transition: 0.3s ease; background: #ef4444"></div>
                </div>
            </div>

            <div class="pass-settings">
                <div class="input-group">
                    <label>Length: <span id="len-val">16</span></label>
                    <input type="range" id="pass-len" min="8" max="64" value="16" style="width: 100%">
                </div>

                <div class="options-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem">
                    <label class="flex items-center gap-2" style="cursor: pointer">
                        <input type="checkbox" id="inc-upper" checked> Uppercase
                    </label>
                    <label class="flex items-center gap-2" style="cursor: pointer">
                        <input type="checkbox" id="inc-lower" checked> Lowercase
                    </label>
                    <label class="flex items-center gap-2" style="cursor: pointer">
                        <input type="checkbox" id="inc-nums" checked> Numbers
                    </label>
                    <label class="flex items-center gap-2" style="cursor: pointer">
                        <input type="checkbox" id="inc-syms" checked> Symbols
                    </label>
                </div>
            </div>

            <button id="gen-btn" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 2rem">
                <i class="fas fa-key"></i> Generate Secure Password
            </button>
        </div>
    </main>

    <div id="toast-container"></div>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/main.js"></script>

    <script>
        const passVal = document.getElementById('pass-val');
        const passLen = document.getElementById('pass-len');
        const lenVal = document.getElementById('len-val');
        const genBtn = document.getElementById('gen-btn');
        const regenBtn = document.getElementById('regen-btn');
        const copyBtn = document.getElementById('copy-btn');
        
        const strengthBar = document.getElementById('strength-bar');
        const strengthText = document.getElementById('strength-text');

        const chars = {
            upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lower: 'abcdefghijklmnopqrstuvwxyz',
            nums: '0123456789',
            syms: '!@#$%^&*()_+~`|}{[]:;?><,./-='
        };

        passLen.addEventListener('input', (e) => lenVal.textContent = e.target.value);

        function generate() {
            let charset = '';
            if (document.getElementById('inc-upper').checked) charset += chars.upper;
            if (document.getElementById('inc-lower').checked) charset += chars.lower;
            if (document.getElementById('inc-nums').checked) charset += chars.nums;
            if (document.getElementById('inc-syms').checked) charset += chars.syms;

            if (!charset) {
                Utils.showToast('Select at least one option!', 'error');
                return;
            }

            let password = '';
            const array = new Uint32Array(parseInt(passLen.value));
            window.crypto.getRandomValues(array);

            for (let i = 0; i < array.length; i++) {
                password += charset[array[i] % charset.length];
            }

            passVal.value = password;
            updateStrength(password);
        }

        function updateStrength(p) {
            let score = 0;
            if (p.length > 12) score += 20;
            if (/[A-Z]/.test(p)) score += 20;
            if (/[a-z]/.test(p)) score += 20;
            if (/[0-9]/.test(p)) score += 20;
            if (/[^A-Za-z0-9]/.test(p)) score += 20;

            strengthBar.style.width = score + '%';
            if (score <= 40) {
                strengthBar.style.backgroundColor = '#ef4444';
                strengthText.textContent = 'Weak';
                strengthText.style.color = '#ef4444';
            } else if (score <= 80) {
                strengthBar.style.backgroundColor = '#f59e0b';
                strengthText.textContent = 'Medium';
                strengthText.style.color = '#f59e0b';
            } else {
                strengthBar.style.backgroundColor = '#10b981';
                strengthText.textContent = 'Strong';
                strengthText.style.color = '#10b981';
            }
        }

        genBtn.addEventListener('click', generate);
        regenBtn.addEventListener('click', generate);
        
        copyBtn.addEventListener('click', () => {
            if (passVal.value === 'Click Generate') return;
            navigator.clipboard.writeText(passVal.value);
            Utils.showToast('Password copied!', 'success');
        });

        generate();
    </script>
</body>
</html>
