<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder/Decoder - SmartTools Hub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    
    <style>
        .base64-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .base64-container { grid-template-columns: 1fr; }
        }

        .box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        textarea {
            width: 100%;
            height: 300px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            color: var(--text);
            padding: 1rem;
            font-family: monospace;
            resize: none;
            outline: none;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="container navbar">
            <a href="../../index.html" class="logo">
                <i class="fas fa-bolt"></i> SmartTools
            </a>
        </div>
    </header>

    <main class="container">
        <div style="text-align: center; padding: 4rem 0 2rem;">
            <h1>Base64 Encoder & Decoder</h1>
            <p>Convert text to Base64 and vice versa instantly.</p>
        </div>

        <div class="base64-container">
            <div class="box">
                <h3>Text</h3>
                <textarea id="text-input" placeholder="Enter plain text here..."></textarea>
                <button class="btn btn-outline" onclick="copyText('text-input')">
                    <i class="fas fa-copy"></i> Copy
                </button>
            </div>
            <div class="box">
                <h3>Base64</h3>
                <textarea id="base64-input" placeholder="Enter Base64 here..."></textarea>
                <button class="btn btn-outline" onclick="copyText('base64-input')">
                    <i class="fas fa-copy"></i> Copy
                </button>
            </div>
        </div>

        <div class="controls">
            <button id="encode-btn" class="btn btn-primary btn-lg">
                Encode <i class="fas fa-arrow-right"></i>
            </button>
            <button id="decode-btn" class="btn btn-secondary btn-lg">
                <i class="fas fa-arrow-left"></i> Decode
            </button>
        </div>
    </main>

    <div id="toast-container"></div>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/main.js"></script>

    <script>
        const textInput = document.getElementById('text-input');
        const base64Input = document.getElementById('base64-input');
        const encodeBtn = document.getElementById('encode-btn');
        const decodeBtn = document.getElementById('decode-btn');

        encodeBtn.addEventListener('click', () => {
            try {
                base64Input.value = btoa(textInput.value);
                Utils.showToast('Text encoded!', 'success');
            } catch (e) {
                Utils.showToast('Invalid text for Base64 encoding', 'error');
            }
        });

        decodeBtn.addEventListener('click', () => {
            try {
                textInput.value = atob(base64Input.value);
                Utils.showToast('Base64 decoded!', 'success');
            } catch (e) {
                Utils.showToast('Invalid Base64 string', 'error');
            }
        });

        window.copyText = (id) => {
            const el = document.getElementById(id);
            el.select();
            document.execCommand('copy');
            Utils.showToast('Copied to clipboard!', 'success');
        };
    </script>
</body>
</html>
