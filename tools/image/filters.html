<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Filters: Grayscale & Blur - SmartTools Hub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    
    <style>
        .filter-workspace {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            margin-top: 2rem;
        }

        @media (max-width: 992px) {
            .filter-workspace { grid-template-columns: 1fr; }
        }

        .preview-area {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 500px;
        }

        #filter-canvas {
            max-width: 100%;
            max-height: 600px;
            border-radius: 0.5rem;
        }

        .controls-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            height: fit-content;
        }

        .filter-item {
            margin-bottom: 1.5rem;
        }

        .filter-item label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <div class="container navbar">
            <a href="../../index.html" class="logo">
                <i class="fas fa-bolt"></i> SmartTools
            </a>
        </div>
    </header>

    <main class="container">
        <div style="text-align: center; padding: 4rem 0 2rem;">
            <h1>Image Filters</h1>
            <p>Apply grayscale, blur, and brightness adjustments to your images.</p>
        </div>

        <div id="upload-zone" class="upload-zone">
            <i class="fas fa-magic"></i>
            <h2>Select Image</h2>
            <p>Upload an image to apply filters</p>
            <input type="file" id="image-input" accept="image/*" style="display: none">
            <button class="btn btn-primary">Choose Image</button>
        </div>

        <div id="workspace" style="display: none">
            <div class="filter-workspace">
                <div class="preview-area">
                    <canvas id="filter-canvas"></canvas>
                </div>

                <div class="controls-panel">
                    <h3>Adjustments</h3>
                    <hr style="margin: 1rem 0; opacity: 0.1">

                    <div class="filter-item">
                        <label>Grayscale <span id="gray-val">0%</span></label>
                        <input type="range" id="gray-input" min="0" max="100" value="0" style="width: 100%">
                    </div>

                    <div class="filter-item">
                        <label>Blur <span id="blur-val">0px</span></label>
                        <input type="range" id="blur-input" min="0" max="20" value="0" style="width: 100%">
                    </div>

                    <div class="filter-item">
                        <label>Brightness <span id="bright-val">100%</span></label>
                        <input type="range" id="bright-input" min="0" max="200" value="100" style="width: 100%">
                    </div>

                    <div class="filter-item">
                        <label>Contrast <span id="contrast-val">100%</span></label>
                        <input type="range" id="contrast-input" min="0" max="200" value="100" style="width: 100%">
                    </div>

                    <button id="download-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem">
                        <i class="fas fa-download"></i> Download Image
                    </button>
                    <button id="reset-btn" class="btn btn-outline" style="width: 100%; margin-top: 0.5rem">
                        Reset Filters
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/main.js"></script>

    <script>
        const imageInput = document.getElementById('image-input');
        const workspace = document.getElementById('workspace');
        const canvas = document.getElementById('filter-canvas');
        const ctx = canvas.getContext('2d');
        
        const grayInput = document.getElementById('gray-input');
        const blurInput = document.getElementById('blur-input');
        const brightInput = document.getElementById('bright-input');
        const contrastInput = document.getElementById('contrast-input');
        
        const downloadBtn = document.getElementById('download-btn');
        const resetBtn = document.getElementById('reset-btn');

        let originalImage = null;

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (f) => {
                originalImage = new Image();
                originalImage.onload = () => {
                    canvas.width = originalImage.width;
                    canvas.height = originalImage.height;
                    applyFilters();
                    workspace.style.display = 'block';
                    document.getElementById('upload-zone').style.display = 'none';
                };
                originalImage.src = f.target.result;
            };
            reader.readAsDataURL(file);
        });

        function applyFilters() {
            if (!originalImage) return;
            
            const grayscale = grayInput.value;
            const blur = blurInput.value;
            const brightness = brightInput.value;
            const contrast = contrastInput.value;

            // Update labels
            document.getElementById('gray-val').textContent = grayscale + '%';
            document.getElementById('blur-val').textContent = blur + 'px';
            document.getElementById('bright-val').textContent = brightness + '%';
            document.getElementById('contrast-val').textContent = contrast + '%';

            // Apply to canvas
            ctx.filter = `grayscale(${grayscale}%) blur(${blur}px) brightness(${brightness}%) contrast(${contrast}%)`;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(originalImage, 0, 0);
        }

        [grayInput, blurInput, brightInput, contrastInput].forEach(el => {
            el.addEventListener('input', applyFilters);
        });

        resetBtn.addEventListener('click', () => {
            grayInput.value = 0;
            blurInput.value = 0;
            brightInput.value = 100;
            contrastInput.value = 100;
            applyFilters();
        });

        downloadBtn.addEventListener('click', () => {
            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'filtered-smarttools.png';
            link.href = dataURL;
            link.click();
            Utils.showToast('Image saved with filters!', 'success');
        });
    </script>
</body>
</html>
