<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Watermark to Image - SmartTools Hub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    
    <style>
        .watermark-workspace {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            margin-top: 2rem;
        }

        @media (max-width: 992px) {
            .watermark-workspace { grid-template-columns: 1fr; }
        }

        .canvas-container-outer {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 500px;
            overflow: auto;
        }

        .settings-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            height: fit-content;
        }
    </style>
</head>
<body>

    <header>
        <div class="container navbar">
            <a href="../../index.html" class="logo">
                <i class="fas fa-bolt"></i> SmartTools
            </a>
        </div>
    </header>

    <main class="container">
        <div style="text-align: center; padding: 4rem 0 2rem;">
            <h1>Add Watermark</h1>
            <p>Protect your images with text or logo watermarks.</p>
        </div>

        <div id="upload-zone" class="upload-zone">
            <i class="fas fa-copyright"></i>
            <h2>Select Image</h2>
            <p>Choose an image to watermark</p>
            <input type="file" id="image-input" accept="image/*" style="display: none">
            <button class="btn btn-primary">Choose Image</button>
        </div>

        <div id="workspace" style="display: none">
            <div class="watermark-workspace">
                <div class="canvas-container-outer">
                    <canvas id="watermark-canvas"></canvas>
                </div>

                <div class="settings-panel">
                    <h3>Watermark Settings</h3>
                    <hr style="margin: 1rem 0; opacity: 0.1">

                    <div class="input-group">
                        <label>Watermark Text</label>
                        <input type="text" id="watermark-text" class="form-control" value="© SmartTools Hub">
                    </div>

                    <div class="input-group">
                        <label>Text Color</label>
                        <input type="color" id="text-color" class="form-control" value="#ffffff" style="height: 45px">
                    </div>

                    <div class="input-group">
                        <label>Opacity</label>
                        <input type="range" id="text-opacity" min="0" max="1" step="0.1" value="0.5" style="width: 100%; accent-color: var(--primary)">
                    </div>

                    <div class="input-group">
                        <label>Font Size</label>
                        <input type="number" id="font-size" class="form-control" value="40">
                    </div>

                    <button id="download-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem">
                        <i class="fas fa-download"></i> Download Image
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/main.js"></script>

    <script>
        const imageInput = document.getElementById('image-input');
        const workspace = document.getElementById('workspace');
        const textInput = document.getElementById('watermark-text');
        const colorInput = document.getElementById('text-color');
        const opacityInput = document.getElementById('text-opacity');
        const fontInput = document.getElementById('font-size');
        const downloadBtn = document.getElementById('download-btn');

        let canvas = new fabric.Canvas('watermark-canvas');
        let watermarkObject = null;

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (f) => {
                const data = f.target.result;
                fabric.Image.fromURL(data, (img) => {
                    // Set canvas size to image size
                    canvas.setWidth(img.width);
                    canvas.setHeight(img.height);
                    canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
                    
                    addWatermarkText();
                    
                    workspace.style.display = 'block';
                    document.getElementById('upload-zone').style.display = 'none';
                });
            };
            reader.readAsDataURL(file);
        });

        function addWatermarkText() {
            if (watermarkObject) canvas.remove(watermarkObject);
            
            watermarkObject = new fabric.Text(textInput.value, {
                left: canvas.width / 2,
                top: canvas.height / 2,
                fontSize: parseInt(fontInput.value),
                fill: colorInput.value,
                opacity: parseFloat(opacityInput.value),
                originX: 'center',
                originY: 'center',
                fontFamily: 'Inter'
            });
            
            canvas.add(watermarkObject);
            canvas.setActiveObject(watermarkObject);
            canvas.renderAll();
        }

        [textInput, colorInput, opacityInput, fontInput].forEach(el => {
            el.addEventListener('input', addWatermarkText);
        });

        downloadBtn.addEventListener('click', () => {
            const dataURL = canvas.toDataURL({
                format: 'png',
                quality: 1
            });
            const link = document.createElement('a');
            link.download = 'watermarked-smarttools.png';
            link.href = dataURL;
            link.click();
            Utils.showToast('Image saved!', 'success');
        });
    </script>
</body>
</html>
